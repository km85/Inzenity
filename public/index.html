<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innova Zenix Community</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="login-card">
      <div class="eyebrow">Member Login</div>
      <h1>Innova Zenix Community</h1>
      <p class="muted">Sign in with a local member account to enter the club app.</p>
      <div class="landing-panel">
        <div class="landing-item">
          <strong>Demo Member</strong>
          <span>raka / member123</span>
        </div>
        <div class="landing-item">
          <strong>Alternative</strong>
          <span>dina / member123</span>
        </div>
        <div class="landing-item">
          <strong>Admin</strong>
          <span><a href="/admin">Open dashboard login</a></span>
        </div>
      </div>
      <div class="demo-strip">
        <button class="pill" type="button" data-demo-username="raka" data-demo-password="member123">Raka</button>
        <button class="pill" type="button" data-demo-username="dina" data-demo-password="member123">Dina</button>
        <button class="pill" type="button" data-demo-username="bimo" data-demo-password="member123">Bimo</button>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" name="username" type="text" placeholder="raka" required>
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="member123" required>
        </div>
        <button class="primary-button" type="submit">Enter Community App</button>
      </form>
    </div>
  </div>

  <div id="appView" class="member-shell hidden">
    <div id="drawerBackdrop" class="drawer-backdrop hidden"></div>

    <aside id="sideDrawer" class="side-drawer hidden">
      <div class="drawer-top">
        <div class="avatar-circle" id="drawerAvatar">R</div>
        <div>
          <strong id="drawerName">Raka Pratama</strong>
          <p id="drawerUsername" class="muted">@raka</p>
        </div>
      </div>
      <nav class="drawer-menu">
        <button class="drawer-link" type="button" data-drawer-target="member-info">Member Information</button>
        <button class="drawer-link" type="button" data-drawer-target="events">Event Registration</button>
        <button class="drawer-link" type="button" data-drawer-target="merchandise">Merchandise</button>
        <button class="drawer-link danger-link" id="drawerLogoutButton" type="button">Logout</button>
      </nav>
    </aside>

    <header class="member-header">
      <button id="menuButton" class="icon-button" type="button" aria-label="Open menu">☰</button>
      <div class="member-header-copy">
        <p class="header-kicker">Good to see you</p>
        <h1 id="greetingName">Raka</h1>
      </div>
      <a href="#home" class="brand-chip" aria-label="Home">IZ</a>
    </header>

    <main class="member-main">
      <section id="screen-home" class="screen"></section>
      <section id="screen-member-info" class="screen hidden"></section>
      <section id="screen-events" class="screen hidden"></section>
      <section id="screen-event-detail" class="screen hidden"></section>
      <section id="screen-merchandise" class="screen hidden"></section>
    </main>

    <nav class="member-bottom-nav">
      <a href="#home" class="member-nav-link" data-screen="home">Home</a>
      <a href="#events" class="member-nav-link" data-screen="events">Events</a>
      <a href="#home" class="member-nav-link brand-nav-link" data-screen="home" aria-label="Brand home">
        <span class="brand-nav-button">IZ</span>
      </a>
      <a href="#merchandise" class="member-nav-link" data-screen="merchandise">Merch</a>
      <a href="#member-info" class="member-nav-link" data-screen="member-info">Info</a>
    </nav>
  </div>

  <script src="/app.js"></script>
</body>
</html>

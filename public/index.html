<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innova Zenix Community</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="login-card">
      <div class="eyebrow">Member Login</div>
      <h1>Innova Zenix Community</h1>
      <p class="muted">Sign in with a local member account to see upcoming club plans, updates, and vendors.</p>
      <div class="landing-panel">
        <div class="landing-item">
          <strong>Demo Member</strong>
          <span>raka / member123</span>
        </div>
        <div class="landing-item">
          <strong>Alternative</strong>
          <span>dina / member123</span>
        </div>
        <div class="landing-item">
          <strong>Admin</strong>
          <span><a href="/admin">Open dashboard login</a></span>
        </div>
      </div>
      <div class="demo-strip">
        <button class="pill" type="button" data-demo-username="raka" data-demo-password="member123">Raka</button>
        <button class="pill" type="button" data-demo-username="dina" data-demo-password="member123">Dina</button>
        <button class="pill" type="button" data-demo-username="bimo" data-demo-password="member123">Bimo</button>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" name="username" type="text" placeholder="raka" required>
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="member123" required>
        </div>
        <button class="primary-button" type="submit">Enter Community App</button>
      </form>
    </div>
  </div>

  <div id="appView" class="shell hidden">
    <main class="mobile-app">
      <section class="hero-card">
        <div class="eyebrow">Community Hub</div>
        <h1 id="welcomeName"></h1>
        <p id="welcomeMeta" class="muted"></p>
      </section>

      <section id="screen-events" class="screen"></section>
      <section id="screen-event-detail" class="screen hidden"></section>
      <section id="screen-announcements" class="screen hidden"></section>
      <section id="screen-vendors" class="screen hidden"></section>
      <section id="screen-profile" class="screen hidden"></section>
    </main>

    <nav class="bottom-nav">
      <div class="nav-bar">
        <a href="#events" class="nav-link" data-screen="events">Events</a>
        <a href="#announcements" class="nav-link" data-screen="announcements">Updates</a>
        <a href="#vendors" class="nav-link" data-screen="vendors">Vendors</a>
        <a href="#profile" class="nav-link" data-screen="profile">Profile</a>
      </div>
    </nav>
  </div>

  <script src="/app.js"></script>
</body>
</html>
